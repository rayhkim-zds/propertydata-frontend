<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Data API Australia - Coming Soon</title>
    <style>
        /* CSS: The "Paint and Decor" */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 3rem 1rem; /* Increased padding for a hero feel */
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            
            /* --- CENTERING LOGIC START --- */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            /* --- CENTERING LOGIC END --- */
        }

        .card img {
            width: 100%; 
            max-width: 300px; 
            border-radius: 8px; 
            margin: 1.5rem 0; /* Space above and below the GIF */
        }

        footer {
            text-align: center;
            padding: 3rem;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Open Data API Australia</h1>
        <p>Empowering insights through open access.</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>Coming Soon</h2>
            
            <img src="construction.gif" alt="Under Construction">
            
            <p>Our developers are hard at work building the portal. Stay tuned!</p>
        </div>
    </div>

    <footer>
        &copy; 2026 Open Data API Australia
    </footer>

</body>
</html>
