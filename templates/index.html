<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PropertyData Australia</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <header>
    <h1>🏠 PropertyData Australia</h1>
    <p>Search any Australian address to get property insights, transport, schools, and development activity.</p>
  </header>

  <main>
    <!-- Search -->
    <section class="search-card">
      <div class="search-wrap">
        <input id="searchInput" type="text" placeholder="Start typing an address…" autocomplete="off"/>
        <ul id="suggestionList" class="suggestions" hidden></ul>
      </div>
    </section>

    <!-- Results (hidden until address selected) -->
    <section id="results" hidden>
      <div id="addressHeader" class="address-header"></div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="property">🏡 Property</button>
        <button class="tab-btn" data-tab="ai">🤖 AI Insights</button>
        <button class="tab-btn" data-tab="transport">🚌 Transport</button>
        <button class="tab-btn" data-tab="schools">🏫 Schools</button>
        <button class="tab-btn" data-tab="da">🏗️ Development</button>
        <button class="tab-btn" data-tab="title">📄 Title Search</button>
      </div>

      <div id="property" class="tab-panel active">
        <div id="propertyContent"><p class="loading">Loading…</p></div>
      </div>

      <div id="ai" class="tab-panel">
        <div id="aiContent"><p class="loading">Loading…</p></div>
      </div>

      <div id="transport" class="tab-panel">
        <div class="radius-row">
          <label>Radius: <strong id="transportRadiusLabel">1000</strong> m</label>
          <input id="transportRadius" type="range" min="100" max="5000" step="100" value="1000"/>
          <button onclick="loadTransport()">Refresh</button>
        </div>
        <div id="transportContent"><p class="loading">Loading…</p></div>
      </div>

      <div id="schools" class="tab-panel">
        <div class="radius-row">
          <label>Radius: <strong id="schoolsRadiusLabel">2000</strong> m</label>
          <input id="schoolsRadius" type="range" min="100" max="10000" step="100" value="2000"/>
          <button onclick="loadSchools()">Refresh</button>
        </div>
        <div id="schoolsContent"><p class="loading">Loading…</p></div>
      </div>

      <div id="title" class="tab-panel">
        <div id="titleContent"><p class="loading">Loading…</p></div>
      </div>

      <div id="da" class="tab-panel">
        <div class="radius-row">
          <label>Radius: <strong id="daRadiusLabel">1000</strong> m</label>
          <input id="daRadius" type="range" min="100" max="5000" step="100" value="1000"/>
          <button onclick="loadDA()">Refresh</button>
        </div>
        <div id="daContent"><p class="loading">Loading…</p></div>
      </div>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
